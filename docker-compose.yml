version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: parking-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - FRONTEND_ORIGIN=http://localhost:8080

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: parking-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
